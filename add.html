<script type="module">
        import { db } from './firebase-config.js';
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const name = document.getElementById('eventName').value.trim();
            const date = document.getElementById('eventDate').value;
            const uid = localStorage.getItem('current_uid'); 

            if (!name || !date) { alert("Please fill in both the name and the date."); return; }
            if (!uid) { alert("You must be logged in to save events."); return; }

            try {
                // 1. Fetch the LATEST list from the cloud, not localStorage
                const docRef = doc(db, "users", uid);
                const docSnap = await getDoc(docRef);
                
                let trackers = [];
                if (docSnap.exists()) {
                    trackers = docSnap.data().trackers || [];
                }

                // 2. Add the new event to the actual cloud list
                trackers.unshift({ 
                    id: Date.now().toString(), 
                    name: name, 
                    date: date 
                });
                
                // 3. Save the combined list back to the cloud
                await setDoc(docRef, { trackers: trackers });
                
                // 4. Update local storage as a backup and redirect
                localStorage.setItem('multi_event_trackers', JSON.stringify(trackers));
                window.location.href = 'index.html';
            } catch (error) {
                console.error("Error saving document: ", error);
                alert("Failed to save to cloud. Please check your connection.");
            }
        });
        
        // --- Unit Tests ---
        function runTests() {
            console.log("Verifying Data Integrity logic...");
            const mockList = [{id: "1", name: "Old"}];
            const newItem = {id: "2", name: "New"};
            const combined = [newItem, ...mockList];
            
            if (combined.length === 2 && combined[0].name === "New") {
                console.log("✅ [PASS] Append logic verified: New items stay at the top, old items preserved.");
            } else {
                console.error("❌ [FAIL] Append logic would result in data loss.");
            }
        }
        runTests();
    </script>
