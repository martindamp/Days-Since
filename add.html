<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Event</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            height: 100vh;
            color: #fff;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #23a6d5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 { margin-top: 0; margin-bottom: 2rem; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .input-group { margin-bottom: 1.5rem; text-align: left; }
        .input-group label { display: block; margin-bottom: 0.5rem; font-size: 0.95rem; font-weight: 600; opacity: 0.9; }

        input {
            width: 100%; box-sizing: border-box; background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4); padding: 1rem; border-radius: 10px;
            color: white; font-family: 'Poppins', sans-serif; font-size: 1.1rem; outline: none; transition: all 0.3s ease;
        }
        input:focus { background: rgba(255, 255, 255, 0.25); box-shadow: 0 0 15px rgba(255, 255, 255, 0.4); border-color: rgba(255, 255, 255, 0.8); }
        
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

        .btn-shiny {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: white;
            border: none; padding: 1rem; width: 100%; border-radius: 10px; font-size: 1.1rem;
            font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4); transition: all 0.3s ease; margin-top: 1rem;
        }
        .btn-shiny:hover { box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6); transform: translateY(-2px); }
        .btn-cancel { background: transparent; box-shadow: none; border: 1px solid rgba(255,255,255,0.5); margin-top: 1rem; }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); box-shadow: none; }
    </style>
</head>
<body>
    <div class="glass-container">
        <h1>Track New Event</h1>
        
        <div class="input-group">
            <label for="eventName">Event Name</label>
            <input type="text" id="eventName" placeholder="e.g., Summer Vacation...">
        </div>

        <div class="input-group">
            <label for="eventDate">Date</label>
            <input type="date" id="eventDate">
        </div>

        <button class="btn-shiny" id="saveBtn">Save Event</button>
        <button class="btn-shiny btn-cancel" onclick="window.location.href='index.html'">Cancel</button>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const name = document.getElementById('eventName').value.trim();
            const date = document.getElementById('eventDate').value;
            const uid = localStorage.getItem('current_uid'); 

            if (!name || !date) { alert("Please fill in both the name and the date."); return; }
            if (!uid) { alert("You must be logged in to save events."); return; }

            try {
                const docRef = doc(db, "users", uid);
                const docSnap = await getDoc(docRef);
                
                let trackers = [];
                if (docSnap.exists()) {
                    trackers = docSnap.data().trackers || [];
                }

                // Add to the beginning of the array
                trackers.unshift({ 
                    id: Date.now().toString(), 
                    name: name, 
                    date: date 
                });
                
                await setDoc(docRef, { trackers: trackers });
                
                localStorage.setItem('multi_event_trackers', JSON.stringify(trackers));
                window.location.href = 'index.html';
            } catch (error) {
                console.error("Error saving document: ", error);
                alert("Failed to save to cloud.");
            }
        });
        
        // --- Unit Tests ---
        function runTests() {
            console.log("Verifying Data Integrity logic...");
            const mockList = [{id: "1", name: "Old"}];
            const newItem = {id: "2", name: "New"};
            const combined = [newItem, ...mockList];
            if (combined.length === 2 && combined[0].name === "New") {
                console.log("✅ [PASS] Append logic verified.");
            } else {
                console.error("❌ [FAIL] Append logic error.");
            }
        }
        runTests();
    </script>
</body>
</html>
