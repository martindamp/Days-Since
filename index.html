<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiny Time Tracker (Cloud Sync)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            color: #fff;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #23a6d5 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 650px; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); padding: 2.5rem; margin-bottom: 1.5rem;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        h1 { margin: 0; font-size: 1.8rem; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

        input {
            width: 100%; box-sizing: border-box; background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4); padding: 1rem; border-radius: 10px;
            color: white; font-family: 'Poppins', sans-serif; font-size: 1rem; outline: none; margin-bottom: 1rem;
        }
        input:focus { background: rgba(255, 255, 255, 0.25); box-shadow: 0 0 15px rgba(255,255,255,0.4); }

        .btn-shiny {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: white; border: none;
            padding: 0.75rem 1.5rem; border-radius: 50px; font-size: 0.9rem; font-weight: 600; cursor: pointer;
            text-decoration: none; box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4); transition: all 0.3s ease;
        }
        .btn-shiny:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6); }
        .btn-danger { background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%); }

        .glass-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 16px;
            padding: 1.5rem; margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center;
            cursor: grab;
        }
        .dragging { opacity: 0.5; border: 1px dashed #fff; }

        .tracker-info h2 { margin: 0; font-size: 1.3rem; }
        .tracker-info p { margin: 5px 0 0 0; font-size: 0.85rem; opacity: 0.8; }
        .tracker-time-container { text-align: right; }
        .tracker-main-time { font-size: 1.6rem; font-weight: 700; }
        .tracker-subtext { font-size: 0.75rem; opacity: 0.7; margin-top: 4px; }

        @media (max-width: 600px) {
            .header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .header-actions { width: 100%; justify-content: space-between; }
            .glass-card { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .tracker-time-container { text-align: left; width: 100%; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 1. LOADING -->
        <div id="loadingScreen" class="glass-panel" style="text-align: center;">
            <h2>Connecting...</h2>
        </div>

        <!-- 2. LOGIN -->
        <div id="loginScreen" class="glass-panel" style="text-align: center; max-width: 400px; margin: 0 auto; display:none;">
            <h1>Welcome Back</h1>
            <input type="email" id="emailInput" placeholder="Email">
            <input type="password" id="passwordInput" placeholder="Password">
            <div style="display: flex; gap: 10px;">
                <button id="loginBtn" class="btn-shiny" style="flex:1;">Login</button>
                <button id="registerBtn" class="btn-shiny" style="flex:1; background:transparent; border:1px solid #fff;">Register</button>
            </div>
            <p id="authError" style="color: #ffb3b3; font-size: 0.8rem; margin-top: 1rem;"></p>
        </div>

        <!-- 3. APP DASHBOARD -->
        <div id="appScreen" style="display:none;">
            <div class="header">
                <div>
                    <h1>My Trackers</h1>
                    <p id="userEmailDisplay" style="margin:0; font-size: 0.8rem; opacity: 0.6;"></p>
                </div>
                <div class="header-actions">
                    <button id="profileBtn" class="btn-shiny">Profile</button>
                    <a href="add.html" class="btn-shiny">+ Add</a>
                    <button id="logoutBtn" class="btn-shiny btn-danger">Exit</button>
                </div>
            </div>
            <div id="trackerList"></div>
        </div>

        <!-- 4. PROFILE SCREEN -->
        <div id="profileScreen" class="glass-panel" style="display:none;">
            <div class="header">
                <h1>Profile</h1>
                <button id="backBtn" class="btn-shiny">Back</button>
            </div>
            <p>Logged in as: <strong id="profileEmail"></strong></p>
            <div id="passSection" style="margin-top: 2rem;">
                <input type="password" id="newPass" placeholder="New Password">
                <button id="savePassBtn" class="btn-shiny" style="width: 100%;">Update Password</button>
            </div>
            <p id="profileMsg" style="margin-top: 1rem; font-size: 0.85rem; text-align: center;"></p>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { 
            signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, updatePassword 
        } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const screens = {
            loading: document.getElementById('loadingScreen'),
            login: document.getElementById('loginScreen'),
            app: document.getElementById('appScreen'),
            profile: document.getElementById('profileScreen')
        };
        const trackerList = document.getElementById('trackerList');
        let currentTrackers = [];

        function showScreen(name) {
            Object.values(screens).forEach(s => s.style.display = 'none');
            screens[name].style.display = 'block';
        }

        // --- AUTH ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userEmailDisplay').textContent = user.email;
                document.getElementById('profileEmail').textContent = user.email;
                localStorage.setItem('current_uid', user.uid);
                showScreen('app');
                fetchTrackers(user);
            } else {
                showScreen('login');
                localStorage.removeItem('current_uid');
            }
        });

        document.getElementById('loginBtn').onclick = () => {
            signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
                .catch(e => authError.textContent = e.message);
        };

        document.getElementById('registerBtn').onclick = () => {
            createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
                .catch(e => authError.textContent = e.message);
        };

        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        // --- PROFILE ---
        document.getElementById('profileBtn').onclick = () => showScreen('profile');
        document.getElementById('backBtn').onclick = () => showScreen('app');
        document.getElementById('savePassBtn').onclick = () => {
            updatePassword(auth.currentUser, newPass.value)
                .then(() => profileMsg.textContent = "Success!")
                .catch(e => profileMsg.textContent = "Error: Relogin required.");
        };

        // --- DATA ---
        async function fetchTrackers(user) {
            const docSnap = await getDoc(doc(db, "users", user.uid));
            if (docSnap.exists()) {
                currentTrackers = docSnap.data().trackers || [];
            } else {
                currentTrackers = JSON.parse(localStorage.getItem('multi_event_trackers') || '[]');
                localStorage.setItem('multi_event_trackers', JSON.stringify(currentTrackers));
                if(currentTrackers.length > 0) await setDoc(doc(db, "users", user.uid), { trackers: currentTrackers });
            }

            // Inside index.html fetchTrackers

            renderTrackers();
        }

        window.deleteTracker = async (id) => {
            currentTrackers = currentTrackers.filter(t => t.id !== id);
            await setDoc(doc(db, "users", auth.currentUser.uid), { trackers: currentTrackers });
            renderTrackers();
        };

        async function saveOrder() {
            const els = [...trackerList.querySelectorAll('.glass-card')];
            currentTrackers = els.map(el => currentTrackers.find(t => t.id === el.dataset.id));
            await setDoc(doc(db, "users", auth.currentUser.uid), { trackers: currentTrackers });
        }

        // --- RENDER ---
        function renderTrackers() {
            trackerList.innerHTML = '';
            currentTrackers.forEach(t => {
                const time = calculateTime(t.date);
                const card = document.createElement('div');
                card.className = 'glass-card';
                card.draggable = true;
                card.dataset.id = t.id;
                card.innerHTML = `
                    <div class="tracker-info">
                        <h2>${t.name}</h2>
                        <p>${t.date.split('-').reverse().join('-')}</p>
                        <button class="btn-shiny btn-danger" onclick="deleteTracker('${t.id}')" style="margin-top:10px; padding:5px 10px; font-size:0.7rem;">Delete</button>
                    </div>
                    <div class="tracker-time-container">
                        <div class="tracker-main-time">${time.totalDays}d ${time.hours}h</div>
                        <div class="tracker-subtext">${time.y}y ${time.d}d ${time.h}h ${time.past ? 'since' : 'away'}</div>
                    </div>
                `;
                card.ondragstart = () => card.classList.add('dragging');
                card.ondragend = () => { card.classList.remove('dragging'); saveOrder(); };
                trackerList.appendChild(card);
            });
        }

        trackerList.ondragover = e => {
            e.preventDefault();
            const drag = document.querySelector('.dragging');
            const after = ([...trackerList.querySelectorAll('.glass-card:not(.dragging)')].find(el => {
                return e.clientY < el.getBoundingClientRect().top + el.getBoundingClientRect().height / 2;
            }));
            after ? trackerList.insertBefore(drag, after) : trackerList.appendChild(drag);
        };

        function calculateTime(d) {
            const t = new Date(d).getTime(), now = new Date().getTime(), past = now >= t, diff = Math.abs(now - t);
            const hrs = Math.floor(diff / 3600000), days = Math.floor(hrs / 24);
            let s = past ? new Date(d) : new Date(), e = past ? new Date() : new Date(d);
            let y = e.getFullYear() - s.getFullYear();
            if (e.getMonth() < s.getMonth() || (e.getMonth() === s.getMonth() && e.getDate() < s.getDate())) y--;
            let ref = new Date(s); ref.setFullYear(ref.getFullYear() + Math.max(0, y));
            return { past, totalDays: days, hours: hrs % 24, y: Math.max(0, y), d: Math.floor((e - ref) / 86400000), h: hrs % 24 };
        }
    </script>
</body>
</html>
