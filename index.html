<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiny Time Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            color: #fff;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #23a6d5 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 650px; /* Slightly widened to accommodate the longer text string */
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-shiny {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
            transition: all 0.3s ease;
        }

        .btn-shiny:hover {
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6);
            transform: scale(1.05);
        }

        .btn-delete {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            box-shadow: 0 4px 15px rgba(255, 65, 108, 0.4);
            margin-top: 10px;
        }

        .btn-delete:hover {
            box-shadow: 0 6px 20px rgba(255, 65, 108, 0.6);
        }

        .tracker-info h2 { margin: 0 0 5px 0; font-size: 1.4rem; }
        .tracker-info p { margin: 0; color: #e0e0e0; font-size: 0.95rem; font-weight: 300;}
        
        .tracker-time-container {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        
        .tracker-main-time {
            font-size: 1.8rem;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            white-space: nowrap;
        }
        
        .tracker-subtext {
            font-size: 0.8rem;
            font-weight: 400;
            opacity: 0.75;
            margin-top: 6px;
            white-space: nowrap;
            background: rgba(0, 0, 0, 0.15);
            padding: 4px 10px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>My Trackers</h1>
            <a href="add.html" class="btn-shiny">+ Add New Event</a>
        </div>

        <div id="trackerList">
            <!-- Trackers will be injected here -->
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'multi_event_trackers';

        /**
         * Formats a standard YYYY-MM-DD string into Danish dd-mm-yyyy
         */
        function formatDanishDate(dateStr) {
            if (!dateStr || !dateStr.includes('-')) return dateStr;
            const parts = dateStr.split('-');
            if (parts.length !== 3) return dateStr;
            return `${parts[2]}-${parts[1]}-${parts[0]}`;
        }

        /**
         * Calculates precise total days, exact calendar years, remaining days, and hours.
         */
        function calculateTimeSince(targetDateStr, currentDateObj = new Date()) {
            if (!targetDateStr) return null;
            
            const targetDate = new Date(targetDateStr);
            if (isNaN(targetDate.getTime())) return null;

            const msTarget = targetDate.getTime();
            const msNow = currentDateObj.getTime();
            const isPast = msNow >= msTarget;
            
            // Calculate Total Days and Hours
            const diffMs = Math.abs(msNow - msTarget);
            const msPerHour = 1000 * 60 * 60;
            const totalHours = Math.floor(diffMs / msPerHour);
            const totalDays = Math.floor(totalHours / 24);
            const hours = totalHours % 24;

            // Calculate Exact Calendar Years and Remaining Days
            let start = isPast ? new Date(targetDate) : new Date(currentDateObj);
            let end = isPast ? new Date(currentDateObj) : new Date(targetDate);

            let years = end.getFullYear() - start.getFullYear();
            
            // Adjust if end date is earlier in the year than the start date
            if (end.getMonth() < start.getMonth() || (end.getMonth() === start.getMonth() && end.getDate() < start.getDate())) {
                years--;
            }
            if (years < 0) years = 0;

            // Advance the start date by the exact number of years calculated
            let dateAfterYears = new Date(start);
            dateAfterYears.setFullYear(dateAfterYears.getFullYear() + years);
            
            // Calculate remaining days between the advanced date and the end date
            const remainingMs = end.getTime() - dateAfterYears.getTime();
            const daysAfterYears = Math.floor(remainingMs / (1000 * 60 * 60 * 24));

            return {
                isPast: isPast,
                totalDays: totalDays,
                years: years,
                days: daysAfterYears,
                hours: hours
            };
        }

        function getTrackers() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveTrackers(trackers) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(trackers));
        }

        function deleteTracker(id) {
            let trackers = getTrackers();
            trackers = trackers.filter(t => t.id !== id);
            saveTrackers(trackers);
            renderTrackers();
        }

        function renderTrackers() {
            const trackerList = document.getElementById('trackerList');
            trackerList.innerHTML = '';
            const trackers = getTrackers();

            if (trackers.length === 0) {
                trackerList.innerHTML = '<p style="text-align:center; opacity:0.8;">No events tracked yet. Click "Add New Event" to start!</p>';
                return;
            }

            trackers.reverse().forEach(tracker => {
                const timeInfo = calculateTimeSince(tracker.date);
                const danishDateString = formatDanishDate(tracker.date);
                
                // Helper to format words based on singular/plural
                const p = (val, unit) => `${val} ${val === 1 ? unit : unit + 's'}`;
                
                const directionText = timeInfo.isPast ? 'since' : 'away';
                const subtextString = `${p(timeInfo.years, 'year')} ${p(timeInfo.days, 'day')} ${p(timeInfo.hours, 'hour')} ${directionText}`;

                const card = document.createElement('div');
                card.className = 'glass-card';
                card.innerHTML = `
                    <div class="tracker-info">
                        <h2>${tracker.name}</h2>
                        <p>${danishDateString}</p>
                        <button class="btn-shiny btn-delete" data-id="${tracker.id}">Delete</button>
                    </div>
                    <div class="tracker-time-container">
                        <div class="tracker-main-time">
                            ${timeInfo.totalDays}d ${timeInfo.hours}h
                        </div>
                        <div class="tracker-subtext">
                            ${subtextString}
                        </div>
                    </div>
                `;
                trackerList.appendChild(card);
            });

            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    deleteTracker(e.target.getAttribute('data-id'));
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTrackers();
            setInterval(renderTrackers, 1000 * 60 * 60); 
        });

        // ==========================================
        // UNIT TESTS (Running silently in console)
        // ==========================================
        function runTests() {
            console.log("Running Unit Tests for Advanced Time Math...");
            function assertEqual(actual, expected, testName) {
                if (actual === expected) {
                    console.log(`✅ [PASS] ${testName}`);
                } else {
                    console.error(`❌ [FAIL] ${testName} - Expected: ${expected}, Got: ${actual}`);
                }
            }

            const mockNow = new Date('2026-05-08T07:30:00Z');

            // Test 1: Recent Date (Less than a year)
            const recentTest = calculateTimeSince('2026-05-01', mockNow);
            assertEqual(recentTest.totalDays, 7, "Recent: Total Days calculation");
            assertEqual(recentTest.years, 0, "Recent: Years calculation");
            assertEqual(recentTest.days, 7, "Recent: Remaining Days calculation");
            assertEqual(recentTest.hours, 7, "Recent: Hours calculation");

            // Test 2: Multi-Year Past Date (Exactly 2 years and 7 days ago)
            const multiYearTest = calculateTimeSince('2024-05-01', mockNow);
            assertEqual(multiYearTest.years, 2, "Multi-Year: Exact Calendar Years");
            assertEqual(multiYearTest.days, 7, "Multi-Year: Remaining Days beyond full years");
            assertEqual(multiYearTest.hours, 7, "Multi-Year: Hours remain accurate");

            // Test 3: Future Date
            const futureTest = calculateTimeSince('2027-06-15', mockNow);
            assertEqual(futureTest.years, 1, "Future: Exact Calendar Years");
            assertEqual(futureTest.isPast, false, "Future: Direction check");
        }
        runTests();
    </script>
</body>
</html>
