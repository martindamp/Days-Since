<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiny Time Tracker (Cloud Sync)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            color: #fff;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #23a6d5 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 650px; }

        /* Glassmorphism Styles */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); padding: 2.5rem; margin-bottom: 1.5rem;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        h1 { margin: 0; font-size: 2rem; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

        /* Buttons & Inputs */
        input {
            width: 100%; box-sizing: border-box; background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4); padding: 1rem; border-radius: 10px;
            color: white; font-family: 'Poppins', sans-serif; font-size: 1rem; outline: none; margin-bottom: 1rem;
        }
        input::placeholder { color: rgba(255,255,255,0.6); }
        input:focus { background: rgba(255, 255, 255, 0.25); box-shadow: 0 0 15px rgba(255,255,255,0.4); }

        .btn-shiny {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: white; border: none;
            padding: 0.75rem 1.5rem; border-radius: 50px; font-size: 1rem; font-weight: 600; cursor: pointer;
            text-decoration: none; box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4); transition: all 0.3s ease; display: inline-block;
        }
        .btn-shiny:hover { box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6); transform: translateY(-2px); }
        .btn-danger { background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%); box-shadow: 0 4px 15px rgba(255, 65, 108, 0.4); }
        .btn-danger:hover { box-shadow: 0 6px 20px rgba(255, 65, 108, 0.6); }

        #appScreen, #loadingScreen { display: none; }
        
        /* Tracker Cards with Drag Styles */
        .glass-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 16px;
            padding: 1.5rem; margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center;
            cursor: grab; /* Shows the user they can pick this up */
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }
        
        .glass-card:active { cursor: grabbing; }
        
        /* Visual feedback when a card is actively being dragged */
        .glass-card.dragging {
            opacity: 0.4;
            transform: scale(0.98);
            border: 1px dashed rgba(255, 255, 255, 0.8);
        }

        .tracker-info { width: 100%; pointer-events: none; /* Prevents text selection while dragging */ }
        .tracker-info h2 { margin: 0 0 5px 0; font-size: 1.4rem; }
        .tracker-info p { margin: 0; color: #e0e0e0; font-size: 0.95rem; font-weight: 300; white-space: nowrap;}
        
        /* Re-enable pointer events on the button so it can still be clicked */
        .btn-delete { pointer-events: auto; }

        .tracker-time-container { text-align: right; display: flex; flex-direction: column; align-items: flex-end; pointer-events: none; }
        .tracker-main-time { font-size: 1.8rem; font-weight: 700; }
        .tracker-subtext { font-size: 0.8rem; opacity: 0.75; margin-top: 6px; background: rgba(0,0,0,0.15); padding: 4px 10px; border-radius: 20px; white-space: nowrap; }

        /* Mobile Fixes */
        @media (max-width: 600px) {
            body { padding: 1.5rem 1rem; }
            .header { flex-direction: column; align-items: flex-start; gap: 1.2rem; }
            h1 { font-size: 1.6rem; }
            .header-actions { width: 100%; display: flex; }
            .header-actions a, .header-actions button { flex: 1; text-align: center; padding: 0.75rem 0.5rem; font-size: 0.9rem; }
            .glass-card { flex-direction: column; align-items: flex-start; gap: 1.2rem; }
            .tracker-time-container { align-items: flex-start; width: 100%; border-top: 1px solid rgba(255, 255, 255, 0.15); padding-top: 1.2rem; }
            .tracker-subtext { white-space: normal; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 1. LOADING SCREEN -->
        <div id="loadingScreen" class="glass-panel" style="text-align: center;">
            <h2>Connecting to Cloud...</h2>
        </div>

        <!-- 2. LOGIN SCREEN -->
        <div id="loginScreen" class="glass-panel" style="text-align: center; max-width: 400px; margin: 0 auto;">
            <h1>Welcome Back</h1>
            <p style="margin-bottom: 2rem; opacity: 0.8;">Sign in to sync your trackers</p>
            <input type="email" id="emailInput" placeholder="Email address">
            <input type="password" id="passwordInput" placeholder="Password">
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 1rem;">
                <button id="loginBtn" class="btn-shiny">Login</button>
                <button id="registerBtn" class="btn-shiny" style="background: transparent; border: 1px solid white; box-shadow: none;">Register</button>
            </div>
            <p id="authError" style="color: #ffb3b3; font-size: 0.9rem; margin-top: 1rem; display: none;"></p>
        </div>

        <!-- 3. MAIN DASHBOARD SCREEN -->
        <div id="appScreen">
            <div class="header">
                <div>
                    <h1>My Trackers</h1>
                    <p id="userEmailDisplay" style="margin: 0; font-size: 0.8rem; opacity: 0.7;"></p>
                </div>
                <div class="header-actions">
                    <a href="add.html" class="btn-shiny">+ Add Event</a>
                    <button id="logoutBtn" class="btn-shiny btn-danger" style="padding: 0.5rem 1rem;">Logout</button>
                </div>
            </div>
            <div id="trackerList"></div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
        
        const screens = {
            loading: document.getElementById('loadingScreen'),
            login: document.getElementById('loginScreen'),
            app: document.getElementById('appScreen')
        };
        const trackerList = document.getElementById('trackerList');
        const authError = document.getElementById('authError');

        function showScreen(screenName) {
            Object.values(screens).forEach(s => s.style.display = 'none');
            screens[screenName].style.display = 'block';
        }

        let currentTrackers = [];

        async function fetchTrackers(user) {
            try {
                const docRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists() && docSnap.data().trackers && docSnap.data().trackers.length > 0) {
                    currentTrackers = docSnap.data().trackers;
                    localStorage.setItem('multi_event_trackers', JSON.stringify(currentTrackers));
                } else {
                    const localData = localStorage.getItem('multi_event_trackers');
                    const localTrackers = localData ? JSON.parse(localData) : [];
                    if (localTrackers.length > 0) {
                        currentTrackers = localTrackers;
                        await setDoc(docRef, { trackers: currentTrackers }); 
                    } else {
                        currentTrackers = [];
                    }
                }
                renderTrackers();
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        window.deleteTrackerFromCloud = async function(id) {
            if(!auth.currentUser) return;
            currentTrackers = currentTrackers.filter(t => t.id !== id);
            await setDoc(doc(db, "users", auth.currentUser.uid), { trackers: currentTrackers });
            localStorage.setItem('multi_event_trackers', JSON.stringify(currentTrackers));
            renderTrackers();
        }

        // --- NEW: Function to save the reordered list to Firebase ---
        async function saveNewOrder() {
            if(!auth.currentUser) return;
            
            // Rebuild the array based on the new visual DOM order
            const newOrderElements = document.querySelectorAll('.glass-card');
            const reorderedTrackers = [];

            newOrderElements.forEach(el => {
                const id = el.getAttribute('data-id');
                const tracker = currentTrackers.find(t => t.id === id);
                if(tracker) reorderedTrackers.push(tracker);
            });

            currentTrackers = reorderedTrackers;
            localStorage.setItem('multi_event_trackers', JSON.stringify(currentTrackers));

            try {
                await setDoc(doc(db, "users", auth.currentUser.uid), { trackers: currentTrackers });
            } catch (error) {
                console.error("Failed to sync new order", error);
            }
        }

        // --- NEW: Drag and Drop Area Logic ---
        trackerList.addEventListener('dragover', e => {
            e.preventDefault(); // Allows elements to be dropped here
            const afterElement = getDragAfterElement(trackerList, e.clientY);
            const draggable = document.querySelector('.dragging');
            
            // Insert the dragged card into its new position
            if (afterElement == null) {
                trackerList.appendChild(draggable);
            } else {
                trackerList.insertBefore(draggable, afterElement);
            }
        });

        // Helper to figure out exactly which card we are hovering above/below
        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.glass-card:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        // ==========================================
        // AUTHENTICATION LOGIC
        // ==========================================
        showScreen('loading');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userEmailDisplay').textContent = user.email;
                showScreen('app');
                fetchTrackers(user);
                localStorage.setItem('current_uid', user.uid); 
            } else {
                showScreen('login');
                localStorage.removeItem('current_uid');
            }
        });

        document.getElementById('loginBtn').addEventListener('click', () => {
            const e = document.getElementById('emailInput').value;
            const p = document.getElementById('passwordInput').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => {
                authError.textContent = err.message; authError.style.display = 'block';
            });
        });

        document.getElementById('registerBtn').addEventListener('click', () => {
            const e = document.getElementById('emailInput').value;
            const p = document.getElementById('passwordInput').value;
            createUserWithEmailAndPassword(auth, e, p).catch(err => {
                authError.textContent = err.message; authError.style.display = 'block';
            });
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        // ==========================================
        // RENDER & TIME LOGIC
        // ==========================================
        function calculateTimeSince(targetDateStr, currentDateObj = new Date()) {
            if (!targetDateStr) return null;
            const msTarget = new Date(targetDateStr).getTime();
            const msNow = currentDateObj.getTime();
            const isPast = msNow >= msTarget;
            const totalHours = Math.floor(Math.abs(msNow - msTarget) / (1000 * 60 * 60));
            const totalDays = Math.floor(totalHours / 24);
            
            let start = isPast ? new Date(targetDateStr) : new Date(currentDateObj);
            let end = isPast ? new Date(currentDateObj) : new Date(targetDateStr);
            let years = end.getFullYear() - start.getFullYear();
            if (end.getMonth() < start.getMonth() || (end.getMonth() === start.getMonth() && end.getDate() < start.getDate())) years--;
            if (years < 0) years = 0;
            
            let dateAfterYears = new Date(start);
            dateAfterYears.setFullYear(dateAfterYears.getFullYear() + years);
            const daysAfterYears = Math.floor((end.getTime() - dateAfterYears.getTime()) / (1000 * 60 * 60 * 24));

            return { isPast, totalDays, years, days: daysAfterYears, hours: totalHours % 24 };
        }

        function formatDanishDate(dateStr) {
            const parts = dateStr.split('-');
            return parts.length === 3 ? `${parts[2]}-${parts[1]}-${parts[0]}` : dateStr;
        }

        function renderTrackers() {
            trackerList.innerHTML = '';
            if (currentTrackers.length === 0) {
                trackerList.innerHTML = '<p style="text-align:center; opacity:0.8;">No events tracked yet. Click "Add Event" to start!</p>';
                return;
            }

            // CRITICAL CHANGE: We removed the .reverse() here so your custom sort order is respected
            currentTrackers.forEach(tracker => {
                const timeInfo = calculateTimeSince(tracker.date);
                const p = (val, unit) => `${val} ${val === 1 ? unit : unit + 's'}`;
                const subtextString = `${p(timeInfo.years, 'year')} ${p(timeInfo.days, 'day')} ${p(timeInfo.hours, 'hour')} ${timeInfo.isPast ? 'since' : 'away'}`;

                const card = document.createElement('div');
                card.className = 'glass-card';
                card.setAttribute('draggable', 'true'); // Makes it draggable
                card.setAttribute('data-id', tracker.id); // Needed to save the new order

                card.innerHTML = `
                    <div class="tracker-info">
                        <h2>${tracker.name}</h2>
                        <p>${formatDanishDate(tracker.date)}</p>
                        <button class="btn-shiny btn-delete btn-danger" onclick="deleteTrackerFromCloud('${tracker.id}')" style="padding: 0.4rem 0.8rem; font-size: 0.8rem; margin-top: 10px;">Delete</button>
                    </div>
                    <div class="tracker-time-container">
                        <div class="tracker-main-time">${timeInfo.totalDays}d ${timeInfo.hours}h</div>
                        <div class="tracker-subtext">${subtextString}</div>
                    </div>
                `;
                
                // Add Drag start/end logic to the card
                card.addEventListener('dragstart', () => {
                    card.classList.add('dragging');
                });

                card.addEventListener('dragend', () => {
                    card.classList.remove('dragging');
                    saveNewOrder(); // Immediately save the new order to the cloud when dropped
                });

                trackerList.appendChild(card);
            });
        }
    </script>
</body>
</html>
